---
# WaselX Kubernetes Deployment Manifest
# Deploy to Kubernetes: kubectl apply -f k8s-deployment.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: waselx
  labels:
    app: waselx

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: waselx-config
  namespace: waselx
data:
  FLASK_ENV: "production"
  FLASK_DEBUG: "0"
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: waselx-secrets
  namespace: waselx
type: Opaque
stringData:
  SECRET_KEY: "your-super-secret-key-change-this-in-production-min-32-chars"
  REDIS_PASSWORD: "your-redis-password-here"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waselx-app
  namespace: waselx
  labels:
    app: waselx
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: waselx
      tier: backend
  template:
    metadata:
      labels:
        app: waselx
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - waselx
                topologyKey: kubernetes.io/hostname
      containers:
      - name: waselx
        image: docker.io/yourusername/waselx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: waselx-config
        - secretRef:
            name: waselx-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: app-data
          mountPath: /app/data
        - name: app-outputs
          mountPath: /app/outputs
        - name: app-logs
          mountPath: /app/logs
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      serviceAccountName: waselx-sa
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: waselx-data-pvc
      - name: app-outputs
        persistentVolumeClaim:
          claimName: waselx-outputs-pvc
      - name: app-logs
        emptyDir: {}
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: waselx-service
  namespace: waselx
  labels:
    app: waselx
spec:
  type: LoadBalancer
  selector:
    app: waselx
    tier: backend
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: waselx-hpa
  namespace: waselx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: waselx-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: waselx-sa
  namespace: waselx

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: waselx-data-pvc
  namespace: waselx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: waselx-outputs-pvc
  namespace: waselx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: waselx-pdb
  namespace: waselx
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: waselx

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: waselx-network-policy
  namespace: waselx
spec:
  podSelector:
    matchLabels:
      app: waselx
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: nginx-ingress
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
