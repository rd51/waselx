# WaselX Kubernetes Ingress Configuration
# For HTTPS, install cert-manager first: https://cert-manager.io/docs/installation/
# Then apply: kubectl apply -f k8s-ingress.yaml

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waselx-ingress
  namespace: waselx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - waselx.example.com
    secretName: waselx-tls-cert
  rules:
  - host: waselx.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: waselx-service
            port:
              number: 80

---
# Let's Encrypt Certificate Issuer (requires cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx

---
# RBAC - Role for WaselX
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: waselx-role
  namespace: waselx
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: waselx-role-binding
  namespace: waselx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: waselx-role
subjects:
- kind: ServiceAccount
  name: waselx-sa
  namespace: waselx

---
# Optional: Prometheus ServiceMonitor (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: waselx-monitor
  namespace: waselx
spec:
  selector:
    matchLabels:
      app: waselx
  endpoints:
  - port: http
    interval: 30s
    path: /metrics

---
# Optional: Network Policy - Allow only nginx-ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: waselx-allow-ingress
  namespace: waselx
spec:
  podSelector:
    matchLabels:
      app: waselx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
